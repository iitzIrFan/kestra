id: loop-parallel-less
namespace: io.kestra.tests

tasks:
  - id: loop
    type: io.kestra.plugin.core.flow.Loop
    concurrencyLimit: 2
    values: ["value 1", "value 2", "value 3", "value 4"]
    tasks:
      - id: item
        type: io.kestra.plugin.core.debug.Return
        format: "{{item.index}} - {{item.value}}"
