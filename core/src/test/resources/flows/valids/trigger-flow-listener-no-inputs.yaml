id: trigger-flow-listener-no-inputs
namespace: io.kestra.tests.trigger
revision: 1

tasks:
  - id: only-no-input
    type: io.kestra.plugin.core.debug.Return
    format: "v1: {{trigger.executionId}}"

triggers:
  - id: listen-flow
    type: io.kestra.plugin.core.trigger.Flow
    dependsOn:
      - states:
          - SUCCESS
        namespace: io.kestra.tests.trigger
        flowId: trigger-flow
  - id: listen-flow-failed
    type: io.kestra.plugin.core.trigger.Flow
    dependsOn:
      - states:
          - FAILED
        namespace: io.kestra.tests.trigger
        flowId: other-flow