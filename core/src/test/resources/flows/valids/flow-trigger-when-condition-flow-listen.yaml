id: flow-trigger-when-condition-flow-listen
namespace: io.kestra.tests.trigger.when.condition

triggers:
  - id: on_completion
    type: io.kestra.plugin.core.trigger.Flow
    states: [ SUCCESS ]
    when: '{{ labels.source ??? labels.source == "when-test" }}'

tasks:
  - id: only
    type: io.kestra.plugin.core.debug.Return
    format: "It works"
