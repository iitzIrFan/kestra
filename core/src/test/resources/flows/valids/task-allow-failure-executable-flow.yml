id: task-allow-failure-executable-flow
namespace: io.kestra.tests

tasks:
  - id: fail
    type: io.kestra.plugin.core.flow.Subflow
    allowFailure: true
    namespace: io.kestra.tests
    flowId: failing-subflow
    transmitFailed: true
    wait: true
  - id: log
    type: io.kestra.plugin.core.log.Log
    message: I'm allowed