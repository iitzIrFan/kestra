id: iteration-outputs
namespace: io.kestra.tests

tasks:
  - id: outer
    type: io.kestra.plugin.core.flow.ForEach
    values: '["100", "200", "300"]'
    tasks:
      - id: each
        type: io.kestra.plugin.core.flow.ForEach
        values: '["1", "3", "5", "10", "12", "14"]'
        tasks:
          - id: inner_even_indices_sum
            type: io.kestra.plugin.core.debug.Return
            format: >-
              {% set idx = taskrun.iteration %}
              {% if idx == 0 %}
                {{ taskrun.value | trim | number + parents[0].taskrun.value | trim |number }}
              {% elseif idx is even %}
                {{ (iterationOutput('inner_even_indices_sum', idx - 2) | trim | number + taskrun.value | trim | number + parents[0].taskrun.value | trim |number) }}
              {% else %}
                {{ iterationOutput('inner_even_indices_sum') | trim | number }}
              {% endif %}
          - id: iteration_output_sibling
            type: io.kestra.plugin.core.debug.Return
            format: >-
              {% set idx = taskrun.iteration %}
              {% if idx <= 1 %}
                {{ taskrun.value | trim | number + parents[0].taskrun.value | trim | number }}
              {% else %}
                {{ iterationOutput('inner_even_indices_sum', idx - 2) | trim | number }}
              {% endif %}
      - id: outer_prefix_sum
        type: io.kestra.plugin.core.debug.Return
        format: >-
          {% set idx = taskrun.iteration %}
          {% if idx == 0 %}
            {{ taskrun.value | trim | number }}
          {% else %}
            {{ iterationOutput('outer_prefix_sum', idx - 1) | trim | number + taskrun.value | trim | number}}
          {% endif %}
      - id: default_all_prefix_sum
        type: io.kestra.plugin.core.debug.Return
        format: >-
          {% set idx = taskrun.iteration %}
          {% if idx == 0 %}
            {{ taskrun.value | trim | number }}
          {% else %}
            {{ iterationOutput() | trim | number + iterationOutput(null, null) | trim | number + taskrun.value | trim | number}}
          {% endif %}

      - id: default_iteration_prefix_sum
        type: io.kestra.plugin.core.debug.Return
        format: >-
          {% set idx = taskrun.iteration %}
          {% if idx == 0 %}
            {{ taskrun.value | trim | number }}
          {% else %}
            {{ iterationOutput('default_iteration_prefix_sum', null) | trim | number + taskrun.value | trim | number}}
          {% endif %}

      - id: default_task_id_prefix_sum
        type: io.kestra.plugin.core.debug.Return
        format: >-
          {% set idx = taskrun.iteration %}
          {% if idx == 0 %}
            {{ taskrun.value | trim | number }}
          {% else %}
            {{ iterationOutput(null, idx - 1) | trim | number + taskrun.value | trim | number}}
          {% endif %}
