id: working-directory-cache
namespace: io.kestra.tests

tasks:
  - id: workingDir
    type: io.kestra.plugin.core.flow.WorkingDirectory
    cache:
      ttl: PT5m
      patterns:
        - "*.txt"
    tasks:
      - id: exists
        type: io.kestra.plugin.core.flow.WorkingDirectoryTest$LocalFiles
        outputs:
          - hello.txt
      - id: inputFiles
        type: io.kestra.plugin.core.flow.WorkingDirectoryTest$LocalFiles
        inputs:
          hello.txt: |
            HELLO WORLD